[project]
site_name = "AWS User's Group"
site_url = "https://rprlab.github.io/aug/"
site_description = "Documentation for the RPR Lab AWS User's Group"
repo_name = "rprlab/aug"
repo_url = "https://github.com/rprlab/aug"
edit_uri = "https://github.com/rprlab/aug/edit/main/docs/"
copyright = "Copyright &copy; 2026 RPR Lab AWS User's Group"
nav = [
  { Home = [
    { Overview = "index.md" },
  ] },
  { "Researchers" = [
    { Introduction = "researchers/introduction.md" },
    { "Accessing AWS" = "researchers/accessing-aws.md" },
    { EC2 = "researchers/ec2.md" },
    { EBS = "researchers/ebs.md" },
    { S3 = "researchers/s3.md" },
  ] },
  { "Administrators" = [
    { Introduction = "administrators/introduction.md" },
    { "Organization Structure" = "administrators/org-structure.md" },
    { "Identity and Access" = "administrators/identity-access.md" },
    { "Resource Standards" = "administrators/resource-standards.md" },
    { "EC2 Security" = "administrators/ec2-security.md" },
    { "AMIs and Launch Templates" = "administrators/amis.md" },
    { "Hoodini AMI Example" = "administrators/hoodini-ami.md" },
  ] },
]
extra_css = ["stylesheets/page-actions.css"]
extra_javascript = ["javascripts/page-actions.js"]

[project.theme]
name = "flexoki"
custom_dir = "overrides"
favicon = "images/favicon.svg"
features = [
  "content.action.edit",
  "content.action.view",
  "content.code.copy",
  "content.code.annotate",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.tabs",
  "navigation.path",
  "navigation.top",
  "search.highlight",
]

[project.theme.icon]
logo = "lucide/box"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
accent = "yellow"
toggle.icon = "lucide/moon-star"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
accent = "cyan"
toggle.icon = "lucide/sun"
toggle.name = "Switch to system preference"

[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.tabbed.slugify]
object = "pymdownx.slugs.slugify"
kwds = { case = "lower" }
[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/rprlab/aug"

[project.extra.flexoki]
linkout_icons = true
